<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en-us" }}">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{{ .Title }}</title>
        {{ with .Site.Params.description }}<meta name="description" content="{{ . }}">{{ end }}
        {{ with .Site.Params.author }}<meta name="author" content="{{ . }}">{{ end }}
        <link rel="stylesheet" href="{{ "css/milligram.css" | relURL }}">
        <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
        <style> @font-face { font-family: inter; src:url({{ absURL "fonts/Inter-VariableFont_opsz,wght.ttf" }}) }</style>
        {{ with .OutputFormats.Get "RSS" -}}
                {{ printf `<link rel="%s" type="%s" href="%s" title="%s">` .Rel .MediaType.Type .RelPermalink $.Site.Title | safeHTML }}
        {{- end }}
</head>
<body>
        <header>{{ partial "header" . }}</header>
        <main>{{ block "main" . }}{{ end }}</main>
        <footer>{{ partial "footer" . }}</footer>

        <script>
document.body.onload = () =>
  Array.from(document.getElementsByTagName("a")).map(x => {
    x.onmouseover = () => x.href = x.href.replace("tu-...", "tu-darmstadt.de")
    //x.onmouseleave = () => x.href = x.href.replace("tu-darmstadt.de", "tu-...")
  })
        </script>
</body>
</html>
